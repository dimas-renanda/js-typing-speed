<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Typing Speed Test</title>
<style>
  body{margin:0;font-family:sans-serif;background:#0f0f1a;color:#eee;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{max-width:700px;width:90%;text-align:center}
  h1{font-size:2rem;margin-bottom:.5rem}
  #quote{background:#1e1e2e;padding:1.5rem;border-radius:10px;font-size:1.2rem;line-height:2;margin:1.5rem 0;text-align:left}
  .correct{color:#a6e3a1}.wrong{color:#f38ba8}.current{border-bottom:2px solid #cdd6f4}
  textarea{width:100%;height:80px;background:#1e1e2e;color:#cdd6f4;border:1px solid #45475a;
    border-radius:8px;padding:.75rem;font-size:1rem;resize:none;outline:none}
  .stats{display:flex;gap:2rem;justify-content:center;margin:1rem 0;font-size:1.1rem}
  .stat span{color:#89b4fa;font-size:1.5rem;font-weight:700;display:block}
  button{background:#89b4fa;color:#1e1e2e;border:none;padding:.75rem 2rem;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <h1>⌨️ Typing Speed Test</h1>
  <div id="quote"></div>
  <textarea id="input" placeholder="Start typing to begin..." oninput="check()"></textarea>
  <div class="stats">
    <div class="stat"><span id="wpm">0</span>WPM</div>
    <div class="stat"><span id="acc">100</span>% ACC</div>
    <div class="stat"><span id="time">0</span>s</div>
  </div>
  <button onclick="restart()">New Quote</button>
</div>
<script>
const quotes=["The quick brown fox jumps over the lazy dog","Programming is the art of telling another human what one wants the computer to do","Any sufficiently advanced technology is indistinguishable from magic","First solve the problem then write the code","Code is like humor when you have to explain it it is bad"];
let current=[],start=null,timer=null;
function restart(){
  const q=quotes[Math.floor(Math.random()*quotes.length)];
  current=q.split('');
  document.getElementById('input').value='';
  document.getElementById('wpm').textContent='0';
  document.getElementById('acc').textContent='100';
  document.getElementById('time').textContent='0';
  clearInterval(timer);start=null;
  render([]);
  document.getElementById('input').focus();
}
function render(typed){
  document.getElementById('quote').innerHTML=current.map((c,i)=>{
    let cls='';
    if(i<typed.length)cls=typed[i]===c?'correct':'wrong';
    else if(i===typed.length)cls='current';
    return`<span class="${cls}">${c==' '?'&nbsp;':c}</span>`;
  }).join('');
}
function check(){
  const inp=document.getElementById('input').value;
  if(inp.length===1&&!start){start=Date.now();timer=setInterval(tick,200)}
  const typed=inp.split('');
  render(typed);
  const correct=typed.filter((c,i)=>c===current[i]).length;
  const acc=typed.length?Math.round(correct/typed.length*100):100;
  document.getElementById('acc').textContent=acc;
  if(typed.length===current.length){
    clearInterval(timer);
    const elapsed=(Date.now()-start)/1000;
    const wpm=Math.round((current.length/5)/(elapsed/60));
    document.getElementById('wpm').textContent=wpm;
  }
}
function tick(){if(start)document.getElementById('time').textContent=((Date.now()-start)/1000).toFixed(1)}
restart();
</script>
</body></html>
